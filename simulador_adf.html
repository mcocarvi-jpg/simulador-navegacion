<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Navegación ADF / VOR</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #4DA8DA; }
        .panel {
            background-color: #2c2c2c;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        .control-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        input[type="range"] { width: 100%; margin: 10px 0; }
        .results {
            display: flex;
            justify-content: space-around;
            background-color: #121212;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
        }
        .highlight-qdm { color: #FFD700; } /* Amarillo */
        .highlight-qdr { color: #00FA9A; } /* Verde */
        
        .instruments {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 20px;
            margin-top: 20px;
        }
        .instrument-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #222;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #444;
        }
        svg {
            background-color: #111;
            border-radius: 50%;
            border: 4px solid #555;
        }
        .needle {
            stroke-width: 4;
            stroke-linecap: round;
        }
    </style>
</head>
<body>

    <h1>Entrenador de Navegación ADF / NDB</h1>
    
    <div class="panel">
        <div class="controls">
            <div class="control-group">
                <label>Rumbo Magnético (HDG): <span id="hdg-val">0</span>°</label>
                <input type="range" id="hdg-slider" min="0" max="359" value="0">
            </div>
            <div class="control-group">
                <label>Marcación Relativa (RB): <span id="rb-val">0</span>°</label>
                <input type="range" id="rb-slider" min="0" max="359" value="0">
            </div>
        </div>
        
        <div class="results">
            <div>QDM (Directo al NDB): <span class="highlight-qdm" id="qdm-val">0°</span></div>
            <div>QDR (Radial actual): <span class="highlight-qdr" id="qdr-val">180°</span></div>
        </div>
    </div>

    <div class="instruments">
        <div class="instrument-box">
            <h3>RBI (Carta Fija)</h3>
            <svg width="200" height="200" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="90" fill="#1a1a1a" stroke="#fff" stroke-width="2"/>
                <text x="100" y="25" fill="#fff" font-size="16" text-anchor="middle">0</text>
                <text x="175" y="105" fill="#fff" font-size="16" text-anchor="middle">90</text>
                <text x="100" y="185" fill="#fff" font-size="16" text-anchor="middle">180</text>
                <text x="25" y="105" fill="#fff" font-size="16" text-anchor="middle">270</text>
                <g id="rbi-needle" transform="rotate(0, 100, 100)">
                    <line x1="100" y1="100" x2="100" y2="30" stroke="#FFD700" class="needle"/>
                    <polygon points="100,20 95,35 105,35" fill="#FFD700"/>
                </g>
                <circle cx="100" cy="100" r="5" fill="#fff"/>
            </svg>
            <p style="font-size: 0.9em; color: #aaa;">El 0° siempre marca la nariz.</p>
        </div>

        <div class="instrument-box">
            <h3>RMI (Carta Móvil)</h3>
            <svg width="200" height="200" viewBox="0 0 200 200">
                <g id="rmi-compass" transform="rotate(0, 100, 100)">
                    <circle cx="100" cy="100" r="90" fill="#1a1a1a" stroke="#fff" stroke-width="2"/>
                    <text x="100" y="25" fill="#FF8C00" font-size="16" text-anchor="middle" font-weight="bold">N</text>
                    <text x="175" y="105" fill="#fff" font-size="16" text-anchor="middle">E</text>
                    <text x="100" y="185" fill="#fff" font-size="16" text-anchor="middle">S</text>
                    <text x="25" y="105" fill="#fff" font-size="16" text-anchor="middle">W</text>
                </g>
                <polygon points="100,5 95,15 105,15" fill="#fff"/> <g id="rmi-needle" transform="rotate(0, 100, 100)">
                    <line x1="100" y1="140" x2="100" y2="30" stroke="#FFD700" class="needle"/>
                    <polygon points="100,20 95,35 105,35" fill="#FFD700"/> <polygon points="100,150 95,135 105,135" fill="#00FA9A"/> </g>
                <path d="M100,85 L102,95 L115,98 L115,102 L102,102 L102,110 L108,113 L108,115 L100,113 L92,115 L92,113 L98,110 L98,102 L85,102 L85,98 L98,95 Z" fill="#fff"/>
            </svg>
            <p style="font-size: 0.9em; color: #aaa;">Arriba marca el HDG actual.</p>
        </div>

        <div class="instrument-box">
            <h3>Visión Topocéntrica (Mapa)</h3>
            <svg width="200" height="200" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="95" fill="#2a3b4c" stroke="#4DA8DA" stroke-width="1"/>
                <line x1="100" y1="0" x2="100" y2="200" stroke="#444" stroke-width="1" stroke-dasharray="4"/>
                <line x1="0" y1="100" x2="200" y2="100" stroke="#444" stroke-width="1" stroke-dasharray="4"/>
                <text x="100" y="15" fill="#4DA8DA" font-size="12" text-anchor="middle">NORTE MAGNÉTICO</text>
                
                <g id="map-ndb">
                    <circle cx="100" cy="30" r="6" fill="#FF3366"/>
                    <circle cx="100" cy="30" r="10" fill="none" stroke="#FF3366" stroke-dasharray="2"/>
                </g>
                
                <g id="map-plane" transform="rotate(0, 100, 100)">
                    <path d="M100,90 L104,100 L115,103 L115,107 L104,105 L104,112 L108,116 L108,118 L100,115 L92,118 L92,116 L96,112 L96,105 L85,107 L85,103 L96,100 Z" fill="#fff"/>
                </g>
            </svg>
        </div>
    </div>

    <script>
        const hdgSlider = document.getElementById('hdg-slider');
        const rbSlider = document.getElementById('rb-slider');
        const hdgVal = document.getElementById('hdg-val');
        const rbVal = document.getElementById('rb-val');
        const qdmVal = document.getElementById('qdm-val');
        const qdrVal = document.getElementById('qdr-val');
        
        const rbiNeedle = document.getElementById('rbi-needle');
        const rmiCompass = document.getElementById('rmi-compass');
        const rmiNeedle = document.getElementById('rmi-needle');
        
        const mapPlane = document.getElementById('map-plane');
        const mapNdb = document.getElementById('map-ndb');

        function updateSim() {
            let hdg = parseInt(hdgSlider.value);
            let rb = parseInt(rbSlider.value);
            
            // Cálculos principales
            let qdm = (hdg + rb) % 360;
            let qdr = (qdm + 180) % 360;
            
            // Actualizar textos
            hdgVal.innerText = hdg;
            rbVal.innerText = rb;
            qdmVal.innerText = qdm + "°";
            qdrVal.innerText = qdr + "°";
            
            // Actualizar RBI: La aguja gira según el RB
            rbiNeedle.setAttribute('transform', `rotate(${rb}, 100, 100)`);
            
            // Actualizar RMI: La carta gira en contra del HDG, la aguja queda en el RB relativo al avión
            rmiCompass.setAttribute('transform', `rotate(${-hdg}, 100, 100)`);
            rmiNeedle.setAttribute('transform', `rotate(${rb}, 100, 100)`);
            
            // Actualizar Mapa
            mapPlane.setAttribute('transform', `rotate(${hdg}, 100, 100)`);
            
            // Posicionar el NDB en el mapa en base al QDM
            let rad = (qdm - 90) * (Math.PI / 180); // -90 para que 0° sea arriba
            let dist = 60; // Distancia fija del centro en el SVG
            let nx = 100 + dist * Math.cos(rad);
            let ny = 100 + dist * Math.sin(rad);
            
            mapNdb.innerHTML = `
                <line x1="100" y1="100" x2="${nx}" y2="${ny}" stroke="#555" stroke-width="2" stroke-dasharray="4"/>
                <circle cx="${nx}" cy="${ny}" r="6" fill="#FF3366"/>
                <circle cx="${nx}" cy="${ny}" r="12" fill="none" stroke="#FF3366" stroke-width="2" stroke-dasharray="2,2"/>
                <text x="${nx}" y="${ny - 15}" fill="#FF3366" font-size="12" font-weight="bold" text-anchor="middle">NDB</text>
            `;
        }

        hdgSlider.addEventListener('input', updateSim);
        rbSlider.addEventListener('input', updateSim);
        
        // Inicializar
        updateSim();
    </script>
</body>
</html>
